<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Selo 0% de juros, 100% de realização">
  <defs>
    <linearGradient id="goldSeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c364"/>
      <stop offset="0.5" stop-color="#f2a73b"/>
      <stop offset="1" stop-color="#d9881f"/>
    </linearGradient>
    <path id="topArc" d="M30 100a70 70 0 0 1 140 0" fill="none"/>
    <path id="botArc" d="M34 100a66 66 0 0 0 132 0" fill="none"/>
  </defs>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="96" fill="#0a2540"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#goldSeal)" stroke-width="3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#goldSeal)" stroke-width="1.5" stroke-dasharray="2 4"/>

  <!-- curved text (rodapé com o nome) -->
  <text font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#cdd9e6">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">JEFFERSON HORTA</textPath>
  </text>

  <!-- center -->
  <text x="100" y="92" text-anchor="middle" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="60" font-weight="800" fill="url(#goldSeal)">0%</text>
  <text x="100" y="116" text-anchor="middle" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="5" fill="#ffffff">DE JUROS</text>

  <!-- estrelinhas laterais -->
  <g fill="#f2a73b">
    <circle cx="30" cy="100" r="2.4"/>
    <circle cx="170" cy="100" r="2.4"/>
    <circle cx="100" cy="42" r="2.4"/>
  </g>
</svg>
